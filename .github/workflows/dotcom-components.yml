name: Build dotcom-components

on:
    pull_request:
        branches:
            - '**'
    push:
        branches:
            - main

jobs:
    dotcom-components:
        if: >-
            (github.event.pull_request.head.repo.owner.login == 'guardian' ||
              github.event_name == 'push')
        # Required by actions-assume-aws-role
        permissions:
            id-token: write
            contents: read
            pull-requests: write # Required for riff-raff action

        name: dotcom-components
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v6

            - run: npm install --global corepack@0.31.0
              shell: bash

            - run: corepack enable
              shell: bash

            - name: Use Node.js
              uses: actions/setup-node@v6.3.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'


            - name: Test + build
              run: |
                  pnpm install
                  pnpm lint
                  pnpm prettier:check
                  pnpm test

                  NODE_ENV=production pnpm build-server

            - name: cdk
              working-directory: ./cdk
              run: |
                  pnpm install
                  pnpm lint
                  pnpm test
                  pnpm synth

            - name: riffraff
              uses: guardian/actions-riff-raff@v4
              with:
                projectName: support::dotcom-components
                roleArn: ${{ secrets.GU_RIFF_RAFF_ROLE_ARN }}
                githubToken: ${{ secrets.GITHUB_TOKEN }}
                configPath: riff-raff.yaml
                buildNumberOffset: 4000
                contentDirectories: |
                  dotcom-components-cloudformation:
                    - cdk/cdk.out/sdc-CODE.template.json
                    - cdk/cdk.out/sdc-PROD.template.json
                  dotcom-components:
                    - server-dist/server.js

    release:
        name: Release
        needs: [dotcom-components]
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        permissions:
            contents: write # in order to write labels to main branch?
            pull-requests: write # to be able to comment on released pull requests
            id-token: write # to enable use of OIDC for npm provenance
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - run: npm install --global corepack@0.31.0
              shell: bash

            - run: corepack enable
              shell: bash

            - name: Setup Node
              uses: actions/setup-node@v6.3.0
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'

            - name: Update npm
              run: npm install -g npm@latest

            - name: Build
              run: |
                  pnpm install
                  pnpm build-dotcom
                  pnpm build-dotcom-types

            - name: Release
              uses: changesets/action@v1
              with:
                  publish: pnpm changeset publish
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
